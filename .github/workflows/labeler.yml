name: Auto-label

# Automatically labels issues and PRs when they are opened, mirroring the
# triage flow used by upstream gittensor / sparkinfer:
#   - PRs get an area:* label for every subsystem they touch (from changed paths)
#     plus status:needs-review. They must also declare a lane explicitly:
#       * fix/bug/docs PRs: CPU-safe CI only, no GPU scorecard required
#       * feat/strategy PRs: score-bearing, require a GPU scorecard
#   - Issues get a type:* label inferred from their title prefix / keywords, plus
#     status:triage.
#
# Labels themselves are defined in .github/labels.yml and materialised by
# .github/workflows/labels-sync.yml.

on:
  issues:
    types: [opened, reopened, edited]
  pull_request_target:
    types: [opened, reopened, synchronize, edited]

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: auto-label-${{ github.event_name }}-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ── Pull requests: area labels from changed paths + scorecard check ─────────
  pr-area:
    if: github.event_name == 'pull_request_target'
    runs-on: ubuntu-latest
    steps:
      - name: Label subsystems from changed paths
        uses: actions/labeler@v5
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true

      - name: Review-state, PR lane, and scorecard labels
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const title = pr.title || "";
            const body = pr.body || "";

            const add = new Set(["status:needs-review"]);
            const remove = new Set();
            const errors = [];

            const explicitFix =
              /^\s*(fix|bug)(\([^)]+\))?:/i.test(title) ||
              /^\s*\[\s*(fix|bug)\s*\]/i.test(title) ||
              /^\s*-\s*\[[xX]\]\s*(fix|bug)\b/im.test(body) ||
              /PR kind\s*:\s*(fix|bug)\b/i.test(body);
            const explicitFeat =
              /^\s*(feat|feature|strategy)(\([^)]+\))?:/i.test(title) ||
              /^\s*\[\s*(feat|feature|strategy)\s*\]/i.test(title) ||
              /^\s*-\s*\[[xX]\]\s*(feat|feature|strategy)\b/im.test(body) ||
              /PR kind\s*:\s*(feat|feature|strategy)\b/i.test(body);

            // The one rule requires a reproducible scorecard. Treat the PR as
            // missing it unless the body carries a filled metric (a number next
            // to accuracy / latency), not just the empty template. This only
            // applies to the feat/strategy lane.
            const hasScorecard =
              /accuracy\s*\|?\s*[0-9]/i.test(body) ||
              /latency\s*\|?\s*[0-9]/i.test(body) ||
              /RESULT_JSON/.test(body);
            const declaredTracks = [
              ...body.matchAll(/^\s*-\s*\[[xX]\]\s*(full-rank|low-rank|decaying-spectrum)\b/gim)
            ];
            const transformMatch = /\*\*Transform:\*\*\s*`?\s*([A-Za-z0-9_.-]+)\s*`?/i.exec(body);
            const hasTransform = Boolean(transformMatch && !/^_+$/.test(transformMatch[1]));

            const strategyLike = /register_transform|class\s+\w+\(Transform\)|\[strategy\]/i.test(
              `${title}\n${body}`
            );

            if (explicitFix && explicitFeat) {
              add.add("status:needs-pr-kind");
              errors.push("Choose exactly one PR lane: fix/bug or feat/strategy.");
            } else if (explicitFeat) {
              add.add("type:feature");
              remove.add("type:bug");
              remove.add("type:docs");
              remove.add("status:needs-pr-kind");
              if (!hasScorecard) {
                add.add("status:needs-scorecard");
                errors.push("Feat/strategy PRs must include a filled GPU scorecard in the PR body.");
              } else {
                remove.add("status:needs-scorecard");
              }
              if (declaredTracks.length !== 1) {
                errors.push("Feat/strategy PRs must declare exactly one checked target track.");
              }
              if (!hasTransform) {
                errors.push("Feat/strategy PRs must declare a named **Transform:** candidate.");
              }
            } else if (explicitFix) {
              add.add("type:bug");
              remove.add("type:feature");
              remove.add("type:strategy");
              remove.add("status:needs-pr-kind");
              remove.add("status:needs-scorecard");
            } else {
              add.add("status:needs-pr-kind");
              remove.add("status:needs-scorecard");
              errors.push("Declare the PR lane explicitly with `fix:` / `bug:` or `feat:` / `strategy:` in the title, or check the matching box in the PR template.");
            }

            if (strategyLike || (explicitFeat && /\bstrategy\b|\btransform\b/i.test(`${title}\n${body}`))) {
              add.add("type:strategy");
            }

            const { owner, repo } = context.repo;
            if (add.size) {
              await github.rest.issues.addLabels({
                owner, repo, issue_number: pr.number, labels: [...add],
              });
            }
            for (const name of remove) {
              await github.rest.issues
                .removeLabel({ owner, repo, issue_number: pr.number, name })
                .catch(() => {}); // label may not be present — ignore 404
            }

            if (errors.length) {
              await github.rest.pulls.update({
                owner, repo, pull_number: pr.number, state: "closed",
              });
              core.setFailed(errors.join(" "));
            }

  # ── Issues: type from title/keywords + triage ───────────────────────────────
  issue-triage:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Infer type labels
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const text = `${issue.title}\n${issue.body || ""}`;
            const labels = new Set(["status:triage"]);

            const rules = [
              [/^\s*\[strategy\]|\btransform\b|\bsubspace\b|\bstrategy\b/i, "type:strategy"],
              [/^\s*\[bug\]|\bbug\b|\bcrash\b|\bincorrect\b|\bwrong\b|\bfails?\b/i, "type:bug"],
              [/^\s*\[docs?\]|\bdocumentation\b|\breadme\b|\btypo\b/i, "type:docs"],
              [/^\s*\[question\]|\bquestion\b|\bhow do i\b|\?$/i, "type:question"],
              [/\bfeat\b|\bfeature\b|\bproposal\b|\benhancement\b|\bimprove\b/i, "type:feature"],
            ];

            for (const [re, label] of rules) {
              if (re.test(text)) labels.add(label);
            }
            // Fall back to feature if no concrete type matched.
            if (![...labels].some(l => l.startsWith("type:"))) {
              labels.add("type:feature");
            }

            const areaRules = [
              [/\bstrategy\b|\btransform\b|\bsubspace\b/i, "area:strategy"],
              [/\bmatmul\b|\bgemm\b|\btile\b|\bkernel\b/i, "area:matmul"],
              [/\beval\b|\bscorer?\b|\bscorecard\b|\bmetric\b/i, "area:eval"],
            ];
            for (const [re, label] of areaRules) {
              if (re.test(text)) labels.add(label);
            }

            const { owner, repo } = context.repo;
            await github.rest.issues.addLabels({
              owner, repo, issue_number: issue.number, labels: [...labels],
            });
