name: GPU batch evaluation

# Manual only. Use this when a maintainer has attached a disposable/self-hosted
# GPU runner. The always-on PR bot builds the queue; this workflow consumes it
# sequentially during a controlled GPU window.

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "Number of queued PRs to evaluate; 0 means all"
        required: true
        default: "1"
      n:
        description: "Matrix edge N"
        required: true
        default: "8192"
      pairs:
        description: "Random couples per PR"
        required: true
        default: "3"
      transforms:
        description: "Optional comma-separated transform names"
        required: false
        default: ""
      seed:
        description: "Optional reproduction seed; leave empty for unseen inputs"
        required: false
        default: ""
      close_rejected:
        description: "Close PRs that receive eval:REJECT"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write
  issues: write
  pull-requests: write

env:
  STATE_BRANCH: bot/dashboard-state

concurrency:
  group: bot-state-pipeline
  cancel-in-progress: false

jobs:
  evaluate:
    runs-on: [self-hosted, gpu, rtx-5090]
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Restore queue and prior result state from bot branch
        run: |
          set -euo pipefail
          if ! git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            echo "State branch $STATE_BRANCH does not exist yet."
            exit 0
          fi
          git fetch --depth=1 origin "$STATE_BRANCH"
          restore_file() {
            local src="$1"
            local dst="$2"
            if git cat-file -e "origin/$STATE_BRANCH:$src" 2>/dev/null; then
              mkdir -p "$(dirname "$dst")"
              git show "origin/$STATE_BRANCH:$src" > "$dst"
            fi
          }
          restore_file dashboard/data.json dashboard/data.json
          restore_file eval/ledger.jsonl eval/ledger.jsonl
          restore_file dashboard/results.json dashboard/results.json

      - name: Run queued PRs sequentially
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          LIMIT: ${{ github.event.inputs.limit }}
          N: ${{ github.event.inputs.n }}
          PAIRS: ${{ github.event.inputs.pairs }}
          TRANSFORMS: ${{ github.event.inputs.transforms }}
          SEED: ${{ github.event.inputs.seed }}
        run: |
          set -euo pipefail
          args=(
            --repo "${{ github.repository }}"
            --queue dashboard/data.json
            --limit "$LIMIT"
            --n "$N"
            --pairs "$PAIRS"
            --runs 5
            --sweep 2048,4096,8192
            --run
            --clean
          )
          if [ -n "$TRANSFORMS" ]; then
            args+=(--transforms "$TRANSFORMS")
          fi
          if [ -n "$SEED" ]; then
            args+=(--seed "$SEED")
          fi
          uv run --extra test python -m eval.gpu_batch "${args[@]}"

      - name: Upload raw GPU results
        uses: actions/upload-artifact@v4
        with:
          name: gpu-results
          path: gpu-results/*.json
          if-no-files-found: warn

      - name: Apply eval labels and rebuild result dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CLOSE_REJECTED: ${{ github.event.inputs.close_rejected }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          results=(gpu-results/*.json)
          if [ ${#results[@]} -eq 0 ]; then
            echo "No GPU result files to process."
            exit 0
          fi
          args=(--write)
          if [ "$CLOSE_REJECTED" = "true" ]; then
            args+=(--close-rejected)
          fi
          uv run --extra test python -m eval.result_bot "${results[@]}" \
            --repo "${{ github.repository }}" \
            "${args[@]}"

      - name: Publish ledger and dashboard results to bot branch
        run: |
          set -euo pipefail
          if git diff --quiet -- eval/ledger.jsonl dashboard/results.json; then
            echo "No result data changes."
            exit 0
          fi
          tmpdir="$(mktemp -d)"
          cp eval/ledger.jsonl "$tmpdir/ledger.jsonl"
          cp dashboard/results.json "$tmpdir/results.json"
          for path in dashboard/data.json eval/ledger.jsonl dashboard/results.json; do
            if git ls-files --error-unmatch "$path" >/dev/null 2>&1; then
              git restore "$path"
            else
              rm -f "$path"
            fi
          done
          if git ls-remote --exit-code --heads origin "$STATE_BRANCH" >/dev/null 2>&1; then
            git fetch --depth=1 origin "$STATE_BRANCH"
            git switch -C "$STATE_BRANCH" "origin/$STATE_BRANCH"
          else
            git switch -c "$STATE_BRANCH"
          fi
          mkdir -p eval dashboard
          cp "$tmpdir/ledger.jsonl" eval/ledger.jsonl
          cp "$tmpdir/results.json" dashboard/results.json
          if git diff --quiet -- eval/ledger.jsonl dashboard/results.json; then
            echo "State branch already up to date."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add eval/ledger.jsonl dashboard/results.json
          git commit -m "dashboard: update verified eval results"
          git push origin HEAD:"$STATE_BRANCH"
