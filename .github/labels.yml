# CCO label taxonomy — the single source of truth for repository labels.
#
# `labels-sync.yml` reads this file and reconciles the repo's labels with it
# (create missing, recolor/redescribe drifted). Edit here, not in the GitHub UI.
#
# Five families:
#   area:*   subsystem the issue/PR touches (auto-applied from changed paths)
#   type:*   what kind of contribution it is (auto-applied from title/template)
#   status:* review/triage state (applied by maintainers or the eval bot)
#   eval:*   deterministic PR verdict from eval.label / eval.pr_bot -- the
#            tier a merged PR is paid on (docs/sn74-emission-strategy.md's
#            target Gittensor label_multipliers use these exact names)
#   (ungrouped) copycat enforcement + governance labels (eval.copycat_guard)

# ── area: subsystems ────────────────────────────────────────────────────────
- name: "area:strategy"
  color: "8250DF"
  description: "Smart strategies / transforms (strategy/)"
- name: "area:matmul"
  color: "006B75"
  description: "Exact engine and tile schedules (matmul/)"
- name: "area:eval"
  color: "0052CC"
  description: "Scorer, metrics, and the scorecard (eval/)"
- name: "area:tests"
  color: "C2E0C6"
  description: "Correctness gates and test suites (tests/)"
- name: "area:examples"
  color: "BFD4F2"
  description: "Runnable examples (examples/)"
- name: "area:docs"
  color: "0E8A16"
  description: "README, CONTRIBUTING, BENCHMARKS and other docs"
- name: "area:ci"
  color: "5319E7"
  description: "GitHub Actions and repository automation (.github/)"

# ── type: contribution kind ─────────────────────────────────────────────────
- name: "type:strategy"
  color: "D4C5F9"
  description: "New smart strategy / transform proposal"
- name: "type:feature"
  color: "1D76DB"
  description: "Feature / improvement PR that must carry a GPU scorecard"
- name: "type:bug"
  color: "B60205"
  description: "Something is incorrect or broken"
- name: "type:enhancement"
  color: "1D76DB"
  description: "Legacy improvement label kept for backward compatibility"
- name: "type:docs"
  color: "FBCA04"
  description: "Documentation-only change"
- name: "type:question"
  color: "D876E3"
  description: "A question or discussion, not a change"

# ── status: triage / review state ───────────────────────────────────────────
- name: "status:needs-scorecard"
  color: "E99695"
  description: "Feature / strategy PR is missing the reproducible eval scorecard"
- name: "status:needs-pr-kind"
  color: "F9D0C4"
  description: "PR must declare whether it is a fix/bug PR or a feat/strategy PR"
- name: "status:needs-review"
  color: "FBCA04"
  description: "Awaiting maintainer review"
- name: "status:ready-non-gpu"
  color: "C5DEF5"
  description: "Fix/docs PR cleared non-GPU triage; maintainer review only"
- name: "status:queued-gpu"
  color: "C2E0C6"
  description: "Feat/strategy PR passed non-GPU gates and is queued for the next batched GPU evaluation"
- name: "status:protected-path"
  color: "B60205"
  description: "PR touches maintainer-owned files and is not eligible for the GPU queue"
- name: "status:triage"
  color: "C5DEF5"
  description: "Newly opened, not yet triaged"

# ── eval: deterministic verdict tiers ───────────────────────────────────────
- name: "eval:L"
  color: "1B998B"
  description: "Verified frontier improvement, large tier (>=25%)"
- name: "eval:M"
  color: "2D9CDB"
  description: "Verified frontier improvement, medium tier (>=10%)"
- name: "eval:S"
  color: "56CCF2"
  description: "Verified frontier improvement, small tier (>=2%, the significance floor)"
- name: "eval:BASELINE"
  color: "6C63FF"
  description: "First admitted strategy on this track"
- name: "eval:none"
  color: "D9D9D9"
  description: "Correct, but does not dominate exact on every cost axis (or gain too small to count)"
- name: "eval:REJECT"
  color: "B60205"
  description: "Accuracy below the floor -- fast and wrong is not an improvement"

# ── copycat enforcement (eval.copycat_guard, eval.pr_bot) ──────────────────
- name: "copycat"
  color: "5C0011"
  description: "Blocked: substantially reproduces an earlier PR (see .github/COPYCATS.md)"
- name: "copycat-warn"
  color: "D93F0B"
  description: "Flagged for maintainer review: significant overlap with an earlier PR"
- name: "flagged:gaming"
  color: "000000"
  description: "Account blocked for gaming the scoring pipeline (see .github/FLAGGED.md)"
